version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install --no-cache-dir -r requirements.txt
run:
  runtime-version: 3.11
  command: gunicorn --bind 0.0.0.0:8080 --workers 2 --threads 4 main:app
  network:
    port: 8080
    env: PORT
  env:
    - name: FLASK_ENV
      value: production
