AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AlexAbraham.dev portfolio site on Lambda + API Gateway HTTP API

Globals:
  Function:
    Runtime: python3.13
    Architectures: [x86_64]
    MemorySize: 1024
    Timeout: 30

Resources:
  SiteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: alexabraham-site
      CodeUri: .
      Handler: main.handler
      Environment:
        Variables:
          STATIC_URL: !Sub https://${StaticBucket}.s3.${AWS::Region}.amazonaws.com
      Policies:
        - Statement:
            - Effect: Allow
              Action: ses:SendEmail
              Resource:
                - !Sub arn:aws:ses:us-east-1:${AWS::AccountId}:identity/alexabraham.net
                - !Sub arn:aws:ses:us-east-1:${AWS::AccountId}:identity/alexabraham.dev
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref SiteHttpApi
            Path: /
            Method: ANY
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref SiteHttpApi
            Path: /{proxy+}
            Method: ANY

  SiteHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default

  NetDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: alexabraham.net
      DomainNameConfigurations:
        - CertificateArn: arn:aws:acm:us-east-1:539234858520:certificate/f5185e62-1a91-41ea-973d-8e16a9561c1c
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  NetApexMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref SiteHttpApi
      DomainName: !Ref NetDomain
      Stage: $default

  NetWwwDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: www.alexabraham.net
      DomainNameConfigurations:
        - CertificateArn: arn:aws:acm:us-east-1:539234858520:certificate/f5185e62-1a91-41ea-973d-8e16a9561c1c
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  NetWwwMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref SiteHttpApi
      DomainName: !Ref NetWwwDomain
      Stage: $default

  DevDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: alexabraham.dev
      DomainNameConfigurations:
        - CertificateArn: arn:aws:acm:us-east-1:539234858520:certificate/4e830a38-07db-4e5a-81a5-0781b1eba5fb
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  DevApexMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref SiteHttpApi
      DomainName: !Ref DevDomain
      Stage: $default

  DevWwwDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: www.alexabraham.dev
      DomainNameConfigurations:
        - CertificateArn: arn:aws:acm:us-east-1:539234858520:certificate/4e830a38-07db-4e5a-81a5-0781b1eba5fb
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  DevWwwMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref SiteHttpApi
      DomainName: !Ref DevWwwDomain
      Stage: $default

  StaticBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-static-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  StaticBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub ${StaticBucket.Arn}/*

  SiteLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${SiteFunction}
      RetentionInDays: 14

Outputs:
  ApiUrl:
    Description: HTTP API default endpoint (use to verify before DNS cutover)
    Value: !Sub https://${SiteHttpApi}.execute-api.${AWS::Region}.amazonaws.com/
  StaticBucketName:
    Description: S3 bucket name for static assets (sync ./static/ here after deploy)
    Value: !Ref StaticBucket
  NetDomainTarget:
    Description: API GW regional domain for alexabraham.net — DNS ALIAS A/AAAA target
    Value: !GetAtt NetDomain.RegionalDomainName
  NetWwwDomainTarget:
    Description: API GW regional domain for www.alexabraham.net — DNS CNAME target
    Value: !GetAtt NetWwwDomain.RegionalDomainName
  DevDomainTarget:
    Description: API GW regional domain for alexabraham.dev — DNS ALIAS A/AAAA target
    Value: !GetAtt DevDomain.RegionalDomainName
  DevWwwDomainTarget:
    Description: API GW regional domain for www.alexabraham.dev — DNS CNAME target
    Value: !GetAtt DevWwwDomain.RegionalDomainName
